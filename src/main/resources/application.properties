spring.application.name=proyectos_api

# Render asigna el puerto dinámicamente. Si no existe (local), usa 8080.
server.port=${PORT:8080}

# Variables de entorno para la BD. Si no existen, usa las locales.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/proyectos_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


